<!doctype html>
<!--
  Prototype variations scaffold (skill: builder-prototype).
  Copy this file, then:
    1. Set the <title> and the H1 to:  5 <plural-noun> for <feature>   (e.g. "5 zoom bars for the grid")
    2. Rename the 5 tab labels to each variation's IDEA (not "Version 1").
    3. Fill each <section class="panel"> with that variation's markup, rendered full-width and in situ.
  The tab JS is generic — add/remove tab+panel pairs and it still works (number keys map 1–9).
  Keep it self-contained: inline CSS/JS only, Tailwind via CDN, no local images (use CSS / inline SVG / emoji).
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>5 VARIATIONS for FEATURE</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --accent:#6366f1; }                /* swap for the target app's accent */
  body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
  .tab { display:flex; align-items:center; gap:.5rem; border-radius:9999px; border:1px solid #e5e7eb;
         background:#fff; padding:.375rem 1rem .375rem .375rem; font-size:.875rem; font-weight:500;
         color:#9ca3af; cursor:pointer; white-space:nowrap; transition:all .12s ease; }
  .tab:hover { color:#475569; border-color:#cbd5e1; }
  .tab .num { display:flex; height:1.5rem; width:1.5rem; align-items:center; justify-content:center;
              border-radius:9999px; background:#f1f5f9; font-size:.75rem; font-weight:600; color:#94a3b8; }
  .tab[aria-selected="true"] { background:#0f172a; border-color:#0f172a; color:#fff; font-weight:600; }
  .tab[aria-selected="true"] .num { background:rgba(255,255,255,.16); color:#fff; }
  .panel[hidden] { display:none; }
  .canvas { min-height:440px; display:flex; flex-direction:column; }
  .canvas-body { flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 1.5rem; }
</style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div class="max-w-[1200px] mx-auto px-6 py-8">

    <div class="flex items-center justify-between gap-4 rounded-2xl bg-white border border-slate-200 shadow-sm px-6 py-4 flex-wrap">
      <h1 class="text-lg font-bold text-slate-900">5 VARIATIONS for FEATURE</h1>
      <nav class="flex items-center gap-2 flex-wrap" aria-label="Variations">
        <button class="tab" aria-selected="true"><span class="num">1</span> Direction one</button>
        <button class="tab" aria-selected="false"><span class="num">2</span> Direction two</button>
        <button class="tab" aria-selected="false"><span class="num">3</span> Direction three</button>
        <button class="tab" aria-selected="false"><span class="num">4</span> Direction four</button>
        <button class="tab" aria-selected="false"><span class="num">5</span> Direction five</button>
      </nav>
    </div>
    <p class="mt-2 px-1 text-xs text-slate-400">Click a tab (or press 1–5) to switch.</p>

    <div class="mt-4 rounded-2xl bg-white border border-slate-200 shadow-sm overflow-hidden">
      <section class="panel"><div class="canvas"><div class="canvas-body"><!-- VARIATION 1 markup --></div></div></section>
      <section class="panel" hidden><div class="canvas"><div class="canvas-body"><!-- VARIATION 2 markup --></div></div></section>
      <section class="panel" hidden><div class="canvas"><div class="canvas-body"><!-- VARIATION 3 markup --></div></div></section>
      <section class="panel" hidden><div class="canvas"><div class="canvas-body"><!-- VARIATION 4 markup --></div></div></section>
      <section class="panel" hidden><div class="canvas"><div class="canvas-body"><!-- VARIATION 5 markup --></div></div></section>
    </div>
  </div>

  <script>
    const tabs = [...document.querySelectorAll('.tab')];
    const panels = [...document.querySelectorAll('.panel')];
    function select(i){
      tabs.forEach((t,j) => t.setAttribute('aria-selected', String(j === i)));
      panels.forEach((p,j) => { p.hidden = j !== i; });
    }
    tabs.forEach((t,i) => t.addEventListener('click', () => select(i)));
    document.addEventListener('keydown', e => { const n = Number(e.key); if (n >= 1 && n <= tabs.length) select(n - 1); });
    select(0);
  </script>
</body>
</html>
